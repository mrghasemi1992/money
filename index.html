<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settle</title>
    <script>
      (function () {
        try {
          var themeRaw = localStorage.getItem('settle-theme');
          var mode = themeRaw ? JSON.parse(themeRaw).state.mode : 'system';
          var systemDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          var resolved =
            mode === 'system' ? (systemDark ? 'dark' : 'light') : mode;
          document.documentElement.dataset.theme = resolved;

          var localeRaw = localStorage.getItem('settle-locale');
          var locale = localeRaw ? JSON.parse(localeRaw).state.locale : 'en';
          document.documentElement.lang = locale;
          document.documentElement.dir = locale === 'fa' ? 'rtl' : 'ltr';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
